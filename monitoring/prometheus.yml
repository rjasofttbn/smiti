global:
  scrape_interval: 15s    # how often to scrape metrics
  evaluation_interval: 15s

scrape_configs:
  # Prometheus scrapes itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot backend
  - job_name: 'backend'
    metrics_path: '/actuator/prometheus'  # default endpoint for Spring Boot Micrometer
    static_configs:
      - targets: ['backend:8080']

  # Loki metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # Promtail metrics
  - job_name: 'promtail'
    static_configs:
      - targets: ['promtail:9080']